<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            min-height: 100vh;
            color: #1e2937;
        }
        
        .sidebar { 
            width: 280px; 
            background: white; 
            border-right: 1px solid #e2e8f0; 
            height: 100vh; 
            position: fixed; 
            box-shadow: 4px 0 20px rgba(0,0,0,0.06); 
            z-index: 100; 
            transition: all 0.3s ease;
        }
        
        .nav-item { 
            padding: 14px 20px; 
            margin: 6px 12px; 
            border-radius: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .nav-item:hover, .nav-item.active { 
            background: #ecfdf5; 
            color: #10b981; 
            transform: translateX(4px);
        }

        .main-content { margin-left: 280px; min-height: 100vh; }

        .header { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(12px);
            padding: 16px 24px; 
            border-bottom: 1px solid #e2e8f0; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }

        .header-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary { 
            background: #10b981; 
            color: white; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 9999px; 
            font-weight: 600; 
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.07); 
        }

        .transaction-item { 
            background: white; 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 12px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.06); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.2s ease;
        }
        .transaction-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        .modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }

        .modal-content {
            background: white; 
            border-radius: 28px; 
            width: 92%; 
            max-width: 460px; 
            max-height: 92vh; 
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <button onclick="toggleSidebar()" style="background:none;border:none;font-size:28px;color:#64748b;">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="header-buttons">
            <button onclick="showRekap()" class="btn-primary">
                <i class="fas fa-chart-bar"></i> Rekap
            </button>
            <button onclick="addTransactionModal()" class="btn-primary">
                <i class="fas fa-plus"></i> Tambah
            </button>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div style="padding: 28px 24px; border-bottom: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 14px;">
                <div><h1 style="font-size: 28px; font-weight: 700; background: linear-gradient(to right, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Afnan</h1></div>
            </div>
        </div>
        <div style="padding: 20px;">
            <div onclick="navigate(0)" class="nav-item active" id="nav-0"><i class="fas fa-list"></i><span>Riwayat</span></div>
            <div onclick="showRekap()" class="nav-item"><i class="fas fa-chart-bar"></i><span>Rekap Keuangan</span></div>
        </div>
    </div>

    <div class="main-content">
        <div id="transactions-page" style="padding: 28px;">
            <div class="filter-container" style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
                <input id="search-input" type="text" placeholder="Cari transaksi..." 
                       style="flex:1; padding:16px 20px; border:1px solid #e2e8f0; border-radius:9999px; font-size:15px;"
                       onkeyup="applyFilters()">
                
                <div style="display:flex; gap:10px;">
                    <input id="date-from" type="date" style="padding:14px 16px; border:1px solid #e2e8f0; border-radius:9999px;" onchange="applyFilters()">
                    <input id="date-to" type="date" style="padding:14px 16px; border:1px solid #e2e8f0; border-radius:9999px;" onchange="applyFilters()">
                </div>
            </div>
            
            <div id="transaction-list"></div>
        </div>
    </div>

    <!-- Modal Tambah/Edit -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div style="padding:32px;">
                <h3 id="modal-title" style="margin-bottom:24px; font-size:22px;">Tambah Transaksi Baru</h3>
                
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; color:#64748b; font-weight:500;">Tipe</label>
                    <div style="display:flex; gap:12px;">
                        <button onclick="selectType(0)" id="type-income" style="flex:1;padding:16px;border:2px solid #10b981;border-radius:16px;font-weight:600;">Pemasukan</button>
                        <button onclick="selectType(1)" id="type-expense" style="flex:1;padding:16px;border:2px solid #e2e8f0;border-radius:16px;font-weight:600;">Pengeluaran</button>
                    </div>
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; color:#64748b;">Nominal (Rp)</label>
                    <input id="amount" type="number" style="width:100%; padding:18px; font-size:28px; border:1px solid #e2e8f0; border-radius:16px; font-weight:600;">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; color:#64748b;">Kategori</label>
                    <select id="category" style="width:100%; padding:16px; border:1px solid #e2e8f0; border-radius:16px;">
                        <option value="Gaji">Gaji</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Makanan">Makanan</option>
                        <option value="Transportasi">Transportasi</option>
                        <option value="Belanja">Belanja</option>
                        <option value="Tagihan">Tagihan</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; color:#64748b;">Deskripsi</label>
                    <input id="description" type="text" placeholder="" style="width:100%; padding:16px; border:1px solid #e2e8f0; border-radius:16px;">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div>
                        <label style="display:block; margin-bottom:8px; color:#64748b;">Tanggal</label>
                        <input id="date" type="date" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:16px;">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; color:#64748b;">Jam</label>
                        <input id="time" type="time" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:16px;">
                    </div>
                </div>
            </div>
            <div style="display:flex;">
                <button onclick="closeModal()" style="flex:1; padding:20px; color:#64748b; border-radius:0 0 0 28px;border: none; font-size:16px;">Batal</button>
                <button onclick="saveTransaction()" id="save-btn" style="flex:1; padding:20px; background:#10b981; color:white;border: none; border-radius:0 0 28px 0; font-size:16px;">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Rekap (Detail + Chart) -->
    <div id="rekap-modal" class="modal">
        <div class="modal-content" style="max-width:520px;">
            <div style="padding:32px;">
                <h3 style="text-align:center; margin-bottom:24px;">Rekap Keuangan</h3>
                
                <div class="card" style="margin-bottom:20px;">
                    <p style="color: #64748b;">Total Pemasukan</p>
                    <p id="rekap-income" style="font-size: 28px; font-weight: 700; color: #10b981;">Rp 0</p>
                </div>
                <div class="card" style="margin-bottom:20px;">
                    <p style="color: #64748b;">Total Pengeluaran</p>
                    <p id="rekap-expense" style="font-size: 28px; font-weight: 700; color: #ef4444;">Rp 0</p>
                </div>
                <div class="card" style="margin-bottom:24px;">
                    <p style="color: #64748b;">Saldo Bersih</p>
                    <p id="rekap-balance" style="font-size: 32px; font-weight: 700;">Rp 0</p>
                </div>

                <h4 style="margin:20px 0 12px;">Breakdown Kategori</h4>
                <div id="category-breakdown" style="margin-bottom:24px;"></div>

                <canvas id="rekapChart" height="180"></canvas>
            </div>
            <div style="padding:20px; border-top:1px solid #e2e8f0;">
                <button onclick="closeRekapModal()" style="width:100%; padding:16px; background:#64748b; color:white; border:none; border-radius:16px; font-size:16px;">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('fintrack_transactions')) || [];
        let currentType = 0;
        let editingId = null;
        let rekapChart = null;

        function formatRupiah(amount) {
            return 'Rp ' + Math.abs(amount).toLocaleString('id-ID');
        }

        function saveToLocalStorage() {
            localStorage.setItem('fintrack_transactions', JSON.stringify(transactions));
        }

        function renderTransactions(filteredTransactions = transactions) {
            const container = document.getElementById('transaction-list');
            container.innerHTML = '';
            
            if (filteredTransactions.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:80px;color:#94a3b8;">Belum ada transaksi</div>`;
                return;
            }
            
            const sorted = [...filteredTransactions].sort((a,b) => {
                const dateA = new Date(a.date + 'T' + (a.time || '00:00'));
                const dateB = new Date(b.date + 'T' + (b.time || '00:00'));
                return dateB - dateA;
            });
            
            sorted.forEach(t => {
                const div = document.createElement('div');
                div.className = 'transaction-item';
                const timeDisplay = t.time ? t.time : '';
                div.innerHTML = `
                    <div style="display:flex;align-items:center;gap:14px;">
                        <div style="width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;background:${t.type===0?'#ecfdf5':'#fee2e2'};color:${t.type===0?'#10b981':'#ef4444'}">
                            ${t.type===0?'↑':'↓'}
                        </div>
                        <div>
                            <div style="font-weight:600;">${t.description || t.category}</div>
                            <small style="color:#64748b;">${new Date(t.date).toLocaleDateString('id-ID')} ${timeDisplay}</small>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:700; font-size:18px; color:${t.type===0?'#10b981':'#ef4444'}">
                            ${t.type===0?'+' : '-'}${formatRupiah(t.amount)}
                        </div>
                        <div style="margin-top:8px;">
                            <button onclick="editTransaction(${t.id})" style="background:#3b82f6;color:white;border:none;padding:6px 12px;border-radius:8px;margin-right:6px;">Edit</button>
                            <button onclick="deleteTransaction(${t.id})" style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:8px;">Hapus</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            
            const filtered = transactions.filter(t => {
                const matchesSearch = (t.description && t.description.toLowerCase().includes(query)) || t.category.toLowerCase().includes(query);
                let matchesDate = true;
                if (dateFrom) matchesDate = matchesDate && t.date >= dateFrom;
                if (dateTo) matchesDate = matchesDate && t.date <= dateTo;
                return matchesSearch && matchesDate;
            });
            
            renderTransactions(filtered);
        }

        function addTransactionModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Tambah Transaksi Baru';
            document.getElementById('save-btn').textContent = 'Simpan';
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('modal').style.display = 'flex';
            
            const now = new Date();
            document.getElementById('date').value = now.toISOString().slice(0,10);
            document.getElementById('time').value = now.toTimeString().slice(0,5);
            selectType(0);
        }

        function selectType(type) {
            currentType = type;
            document.getElementById('type-income').style.borderColor = type === 0 ? '#10b981' : '#e2e8f0';
            document.getElementById('type-expense').style.borderColor = type === 1 ? '#ef4444' : '#e2e8f0';
        }

        function saveTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount) return alert("Masukkan nominal!");

            const transaction = {
                id: editingId || Date.now(),
                type: currentType,
                amount: amount,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value
            };

            if (editingId) {
                const index = transactions.findIndex(t => t.id === editingId);
                if (index !== -1) transactions[index] = transaction;
            } else {
                transactions.unshift(transaction);
            }

            saveToLocalStorage();
            closeModal();
            applyFilters();
        }

        function editTransaction(id) {
            const t = transactions.find(tr => tr.id === id);
            if (!t) return;
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Transaksi';
            document.getElementById('save-btn').textContent = 'Update';
            
            document.getElementById('amount').value = t.amount;
            document.getElementById('description').value = t.description || '';
            document.getElementById('category').value = t.category;
            document.getElementById('date').value = t.date;
            document.getElementById('time').value = t.time || '';
            
            selectType(t.type);
            document.getElementById('modal').style.display = 'flex';
        }

        function deleteTransaction(id) {
            if (confirm('Hapus transaksi ini?')) {
                transactions = transactions.filter(t => t.id !== id);
                saveToLocalStorage();
                applyFilters();
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            editingId = null;
        }

        function showRekap() {
            let income = 0, expense = 0;
            const categoryMap = {};

            transactions.forEach(t => {
                if (t.type === 0) {
                    income += t.amount;
                    categoryMap[t.category] = (categoryMap[t.category] || 0) + t.amount;
                } else {
                    expense += t.amount;
                    categoryMap[t.category] = (categoryMap[t.category] || 0) - t.amount;
                }
            });

            const balance = income - expense;

            document.getElementById('rekap-income').textContent = formatRupiah(income);
            document.getElementById('rekap-expense').textContent = formatRupiah(expense);
            document.getElementById('rekap-balance').textContent = formatRupiah(balance);
            document.getElementById('rekap-balance').style.color = balance >= 0 ? '#10b981' : '#ef4444';

            // Breakdown Kategori
            let breakdownHTML = '';
            Object.keys(categoryMap).forEach(cat => {
                const val = categoryMap[cat];
                breakdownHTML += `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;">
                        <span>${cat}</span>
                        <span style="font-weight:600;color:${val >= 0 ? '#10b981' : '#ef4444'}">${val >= 0 ? '+' : ''}${formatRupiah(val)}</span>
                    </div>`;
            });
            document.getElementById('category-breakdown').innerHTML = breakdownHTML;

            // Chart
            const ctx = document.getElementById('rekapChart');
            if (rekapChart) rekapChart.destroy();
            
            const incomeByCat = {};
            const expenseByCat = {};
            transactions.forEach(t => {
                if (t.type === 0) incomeByCat[t.category] = (incomeByCat[t.category] || 0) + t.amount;
                else expenseByCat[t.category] = (expenseByCat[t.category] || 0) + t.amount;
            });

            rekapChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(incomeByCat).concat(Object.keys(expenseByCat)),
                    datasets: [{
                        data: Object.values(incomeByCat).concat(Object.values(expenseByCat)),
                        backgroundColor: ['#10b981', '#34d399', '#eab308', '#3b82f6', '#8b5cf6', '#ec4899', '#ef4444']
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            document.getElementById('rekap-modal').style.display = 'flex';
        }

        function closeRekapModal() {
            document.getElementById('rekap-modal').style.display = 'none';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function navigate(page) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-0').classList.add('active');
        }

        function getCurrentFilteredTransactions() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            
            return transactions.filter(t => {
                const matchesSearch = (t.description && t.description.toLowerCase().includes(query)) || t.category.toLowerCase().includes(query);
                let matchesDate = true;
                if (dateFrom) matchesDate = matchesDate && t.date >= dateFrom;
                if (dateTo) matchesDate = matchesDate && t.date <= dateTo;
                return matchesSearch && matchesDate;
            });
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.text("Rekap Transaksi FinTrack", 20, 20);
            doc.setFontSize(12);
            doc.text(`Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`, 20, 35);
            
            let y = 50;
            const filtered = getCurrentFilteredTransactions();
            
            if (filtered.length === 0) {
                doc.text("Tidak ada transaksi.", 20, y);
                doc.save("fintrack-transaksi.pdf");
                return;
            }
            
            // Header tabel
            doc.setFillColor(16, 185, 129);
            doc.rect(20, y, 170, 10, "F");
            doc.setTextColor(255, 255, 255);
            doc.text("Tanggal", 25, y + 7);
            doc.text("Deskripsi", 70, y + 7);
            doc.text("Kategori", 130, y + 7);
            doc.text("Nominal", 165, y + 7);
            y += 12;
            doc.setTextColor(0, 0, 0);
            
            filtered.forEach(t => {
                if (y > 270) { doc.addPage(); y = 20; }
                const dateStr = new Date(t.date).toLocaleDateString('id-ID') + (t.time ? ' ' + t.time : '');
                const desc = (t.description || t.category).length > 25 ? (t.description || t.category).substring(0, 22) + '...' : (t.description || t.category);
                const nominal = (t.type === 0 ? '+' : '-') + formatRupiah(t.amount);
                
                doc.text(dateStr, 25, y);
                doc.text(desc, 70, y);
                doc.text(t.category, 130, y);
                doc.text(nominal, 165, y);
                y += 10;
            });
            
            let income = 0, expense = 0;
            filtered.forEach(t => t.type === 0 ? income += t.amount : expense += t.amount);
            y += 10;
            doc.setFont("helvetica", "bold");
            doc.text("Ringkasan:", 20, y); y += 10;
            doc.text(`Total Pemasukan: ${formatRupiah(income)}`, 20, y); y += 8;
            doc.text(`Total Pengeluaran: ${formatRupiah(expense)}`, 20, y); y += 8;
            doc.text(`Saldo: ${formatRupiah(income - expense)}`, 20, y);
            
            doc.save("fintrack-transaksi.pdf");
        }

        window.onload = () => {
            const now = new Date();
            const fromDate = new Date(now);
            fromDate.setDate(now.getDate() - 30);
            
            document.getElementById('date-from').value = fromDate.toISOString().slice(0,10);
            document.getElementById('date-to').value = now.toISOString().slice(0,10);
            
            renderTransactions();
        };
    </script>
</body>
</html>
